# ============================================
# AfiliaML — Python Backend Docker Compose
# ============================================

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: afiliaml-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - afiliaml_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - afiliaml-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: afiliaml-redis-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - afiliaml-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afiliaml-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://redis:6379
      ENV: production
      PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - afiliaml-network

networks:
  afiliaml-network:
    driver: bridge

volumes:
  afiliaml_redis_data:
    driver: local
